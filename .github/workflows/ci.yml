name: CI - Pirate Unified Wallet

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, develop]

env:
  RUST_VERSION: "1.90.0"
  FLUTTER_VERSION: "3.41.1"
  FRB_CODEGEN_VERSION: "2.11.1"
  GO_VERSION: "1.21.13"
  JAVA_VERSION: "25"
  COCOAPODS_VERSION: "1.16.2"
  APPIMAGETOOL_URL: "https://github.com/AppImage/AppImageKit/releases/download/13/obsolete-appimagetool-x86_64.AppImage"
  APPIMAGETOOL_SHA256: "df3baf5ca5facbecfc2f3fa6713c29ab9cefa8fd8c1eac5d283b79cab33e4acb"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  ANDROID_PLATFORM_VERSION: "36"
  ANDROID_NDK_VERSION: "26.1.10909125"
  SYFT_VERSION: "1.40.1"
  SYFT_SHA256_LINUX_AMD64: "c229137c919f22aa926c1c015388db5ec64e99c078e0baac053808e8f36e2e00"
  SYFT_SHA256_DARWIN_ARM64: "c0f6a4fc0563ef1dfe1acf9a4518db66cb37bbb1391889aba3be773dff3487dd"
  SYFT_SHA256_DARWIN_AMD64: "9e84d1f152ef9d3bb541cc7cedf81ed4c7ed78f6cc2e4c8f0db9e052b64cd7be"
  SYFT_SHA256_WINDOWS_AMD64: "eedac363e277dfecac420b6e4ed0a861bc2c9c84a7544157f52807a99bff07cd"
  CARGO_AUDIT_VERSION: "0.22.0"
  CARGO_DENY_VERSION: "0.19.0"
  CARGO_AUDITABLE_VERSION: "0.7.2"
  CARGO_TERM_COLOR: always

jobs:
  workflow-action-pinning:
    name: Security - Pinned GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Verify immutable GitHub Action refs
        run: python3 scripts/check_pinned_actions.py

  frb-codegen:
    name: FRB - Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-frb-${{ hashFiles('**/Cargo.lock') }}

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --locked --version ${{ env.FRB_CODEGEN_VERSION }} --force

      - name: Prepare Flutter Dart toolchain
        run: |
          cd app
          flutter pub get --enforce-lockfile
          cd ..
          mkdir -p .dart_tool
          cp app/.dart_tool/package_config.json .dart_tool/package_config.json

      - name: Generate flutter_rust_bridge bindings
        run: |
          FRB_SIMPLE_BUILD_SKIP=1 flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml

      - name: Verify bindings are up to date
        run: git diff --exit-code

  # ========================================================================
  # Rust Quality Gates
  # ========================================================================

  rust-lint:
    name: Rust - Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: crates/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: |
          cd crates
          cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cd crates
          cargo clippy --all-targets --all-features --locked -- -D warnings

  rust-test:
    name: Rust - Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: |
          cd crates
          cargo test --all-features --locked

  rust-qortal-tests:
    name: Rust - Qortal Adapter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-cargo-qortal-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Qortal-focused checks
        run: |
          cd crates
          cargo test -p pirate-cli-core --lib qortal_ --locked
          cargo check -p pirate-wallet-service --locked
          cargo test -p pirate-core qortal_p2sh --locked -- --nocapture
          cargo build --release -p pirate-qortal-cli --locked

  rust-property-tests:
    name: Rust - Property Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            crates/target
          key: ${{ runner.os }}-cargo-proptest-${{ hashFiles('**/Cargo.lock') }}

      - name: Run property tests
        run: |
          cd crates/pirate-core
          cargo test --test property_tests --release --locked

  rust-migration-tests:
    name: Rust - Migration Snapshot Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            crates/target
          key: ${{ runner.os }}-cargo-migration-${{ hashFiles('**/Cargo.lock') }}

      - name: Run migration tests
        run: |
          cd crates/pirate-storage-sqlite
          cargo test --test migration_snapshots --locked

  rust-perf-tests:
    name: Rust - Performance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            crates/target
          key: ${{ runner.os }}-cargo-perf-${{ hashFiles('**/Cargo.lock') }}

      - name: Run performance benchmarks
        run: |
          cd crates/pirate-sync-lightd
          cargo test --test performance_benchmarks --release --locked -- --nocapture

  # ========================================================================
  # Security Audits
  # ========================================================================

  security-audit:
    name: Security - Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version ${{ env.CARGO_AUDIT_VERSION }}

      - name: Run cargo audit
        run: |
          cd crates
          cargo audit --ignore RUSTSEC-2023-0071

  security-deny:
    name: Security - Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version ${{ env.CARGO_DENY_VERSION }}

      - name: Run cargo deny
        run: |
          cd crates
          cargo deny check --config ../deny.toml

  security-semgrep-rust:
    name: Security - Semgrep (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep==1.36.0

      - name: Run Semgrep on Rust files
        env:
          SEMGREP_PARALLELISM: "1"
        run: semgrep scan --config .semgrep.yml --error --metrics off --jobs 1 --max-memory 1500 --timeout 45 --include="crates/**/*.rs"

  security-semgrep-dart:
    name: Security - Semgrep (Dart)
    runs-on: ubuntu-latest
    # Disabled: Dart scans exhaust CI memory even with minimal rules
    # Security-critical code (crypto, networking, keys) is in Rust (covered by security-semgrep-rust)
    # Dart layer is primarily UI - manual code review covers UI security
    if: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep==1.36.0

      - name: Run Semgrep on Dart files
        env:
          SEMGREP_PARALLELISM: "1"
        run: semgrep scan --config .semgrep.yml --error --metrics off --jobs 1 --max-memory 2000 --timeout 60 --include="app/lib/**/*.dart"

  # ========================================================================
  # Flutter Quality Gates
  # ========================================================================

  flutter-analyze:
    name: Flutter - Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        run: |
          cd app
          flutter pub get --enforce-lockfile

      - name: Analyze code
        run: |
          cd app
          flutter analyze --fatal-infos

  flutter-test:
    name: Flutter - Unit & Widget Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        run: |
          cd app
          flutter pub get --enforce-lockfile

      - name: Run tests
        run: |
          cd app
          flutter test --coverage $(find test -name '*_test.dart')

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: ./app/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false

  flutter-integration-tests:
    name: Flutter - Integration Tests
    runs-on: macos-latest  # Use macOS for iOS simulator
    # Skip integration tests in CI - they require a live lightwalletd backend
    if: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build Rust FFI library
        run: |
          cd crates
          cargo build --release --package pirate-ffi-frb --features frb --no-default-features --locked

      - name: Get dependencies
        run: |
          cd app
          flutter pub get --enforce-lockfile

      - name: Run integration tests
        run: |
          cd app
          if ! ../scripts/e2e-preflight.sh; then
            echo "Skipping integration tests (missing E2E prerequisites)."
            exit 0
          fi
          flutter config --enable-macos-desktop
          flutter test integration_test/ -d macos

  # ========================================================================
  # Build Matrix
  # ========================================================================

  build-matrix:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs:
      - workflow-action-pinning
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Android
            os: ubuntu-latest
            build-command: flutter build apk --release --split-per-abi
          - platform: iOS
            os: macos-latest
            build-command: flutter build ios --release --no-codesign
          - platform: Linux
            os: ubuntu-latest
            build-command: flutter build linux --release
          - platform: macOS
            os: macos-latest
            build-command: flutter build macos --release
          - platform: Windows
            os: windows-latest
            build-command: flutter build windows --release

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Setup Android SDK
        if: matrix.platform == 'Android'
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Install CocoaPods
        if: matrix.platform == 'iOS'
        run: gem install cocoapods -v ${{ env.COCOAPODS_VERSION }}

      - name: Install Linux dependencies
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev

      - name: Get dependencies
        run: |
          cd app
          flutter pub get --enforce-lockfile

      - name: Enable Linux desktop
        if: matrix.platform == 'Linux'
        run: flutter config --enable-linux-desktop

      - name: Enable macOS desktop
        if: matrix.platform == 'macOS'
        run: flutter config --enable-macos-desktop

      - name: Enable Windows desktop
        if: matrix.platform == 'Windows'
        run: flutter config --enable-windows-desktop

      - name: Build ${{ matrix.platform }}
        run: |
          cd app
          ${{ matrix.build-command }}

  backend-release-plan:
    name: Release - Backend Artifact Diff
    runs-on: ubuntu-latest
    needs:
      - workflow-action-pinning
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')))
    outputs:
      cli_changed: ${{ steps.diff.outputs.cli_changed }}
      qortal_cli_changed: ${{ steps.diff.outputs.qortal_cli_changed }}
      native_ffi_changed: ${{ steps.diff.outputs.native_ffi_changed }}
      ios_sdk_changed: ${{ steps.diff.outputs.ios_sdk_changed }}
      android_sdk_changed: ${{ steps.diff.outputs.android_sdk_changed }}
      react_native_plugin_changed: ${{ steps.diff.outputs.react_native_plugin_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Detect backend artifact version changes
        id: diff
        run: |
          python3 scripts/detect-release-artifacts.py --github-output "$GITHUB_OUTPUT"
          python3 scripts/detect-release-artifacts.py

  package-cli:
    name: Package - CLI (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs:
      - rust-test
      - backend-release-plan
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')))
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            os: ubuntu-latest
            bin-ext: ""
            artifact-name: cli-linux
          - platform: macOS
            os: macos-latest
            bin-ext: ""
            artifact-name: cli-macos
          - platform: Windows
            os: windows-latest
            bin-ext: ".exe"
            artifact-name: cli-windows
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build CLI binaries
        run: |
          cd crates
          cargo build --release -p piratewallet-cli -p pirate-qortal-cli

      - name: Collect CLI binaries
        shell: bash
        run: |
          mkdir -p dist/cli
          cp "crates/target/release/piratewallet-cli${{ matrix.bin-ext }}" dist/cli/
          cp "crates/target/release/pirate-qortal-cli${{ matrix.bin-ext }}" dist/cli/

      - name: Upload CLI binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/cli/*

  package-native-ffi:
    name: Package - Native FFI
    runs-on: ubuntu-latest
    needs:
      - rust-test
      - backend-release-plan
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build native FFI
        run: |
          chmod +x scripts/build-native-ffi.sh
          ./scripts/build-native-ffi.sh

      - name: Collect native SDK inputs
        run: |
          set -euo pipefail
          mkdir -p dist/native-ffi/ios-sdk dist/native-ffi/android-sdk
          find crates/target/release -maxdepth 1 -type f \( \
            -name 'libpirate_ffi_native.a' \
            -o -name 'libpirate_ffi_native.so' \
            -o -name 'pirate_ffi_native.dll' \
            -o -name 'pirate_ffi_native.lib' \
          \) -exec cp -f {} dist/native-ffi/ \;
          if [ -f crates/pirate-ffi-native/pirate_wallet_service.h ]; then
            cp -f crates/pirate-ffi-native/pirate_wallet_service.h dist/native-ffi/
          fi
          cp -R bindings/ios-sdk/. dist/native-ffi/ios-sdk/
          cp -R bindings/android-sdk/. dist/native-ffi/android-sdk/

      - name: Upload native FFI package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: native-ffi
          path: dist/native-ffi/**/*

  package-ios-sdk:
    name: Package - iOS SDK
    runs-on: macos-15
    needs:
      - rust-test
      - backend-release-plan
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode_26.3.app ]; then
            export DEVELOPER_DIR=/Applications/Xcode_26.3.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.2.app ]; then
            export DEVELOPER_DIR=/Applications/Xcode_26.2.app/Contents/Developer
          else
            echo "No supported Xcode 26.x installation found on runner" >&2
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
          xcodebuild -version

      - name: Build iOS SDK
        run: |
          chmod +x scripts/build-ios-sdk.sh
          ./scripts/build-ios-sdk.sh

      - name: Verify iOS SDK Swift package
        run: |
          cd bindings/ios-sdk
          SCHEME="$(xcodebuild -list -json | python3 -c 'import json, sys; data = json.load(sys.stdin); schemes = data.get("workspace", {}).get("schemes") or data.get("project", {}).get("schemes") or []; preferred = ["PirateWalletSDK", "PirateWalletSDK-Package"]; print(next((name for name in preferred if name in schemes), schemes[0] if schemes else "")); sys.exit(0 if schemes else 1)')"
          rm -rf /tmp/pirate-ios-sdk-derived-data
          xcodebuild \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath /tmp/pirate-ios-sdk-derived-data \
            build

      - name: Smoke test iOS SDK package
        run: |
          cd bindings/ios-sdk
          SCHEME="$(xcodebuild -list -json | python3 -c 'import json, sys; data = json.load(sys.stdin); schemes = data.get("workspace", {}).get("schemes") or data.get("project", {}).get("schemes") or []; preferred = ["PirateWalletSDK", "PirateWalletSDK-Package"]; print(next((name for name in preferred if name in schemes), schemes[0] if schemes else "")); sys.exit(0 if schemes else 1)')"
          DESTINATION="$(xcrun simctl list devices available -j | python3 -c 'import json, sys; devices = json.load(sys.stdin).get("devices", {}); preferred = [("com.apple.CoreSimulator.SimRuntime.iOS-26-2", "iPhone 17"), ("com.apple.CoreSimulator.SimRuntime.iOS-26-2", "iPhone 16"), ("com.apple.CoreSimulator.SimRuntime.iOS-26-1", "iPhone 17"), ("com.apple.CoreSimulator.SimRuntime.iOS-26-1", "iPhone 16"), ("com.apple.CoreSimulator.SimRuntime.iOS-18-6", "iPhone 16"), ("com.apple.CoreSimulator.SimRuntime.iOS-18-5", "iPhone 16")]; available = [(runtime, device.get("name")) for runtime, entries in devices.items() if "iOS" in runtime for device in entries if device.get("isAvailable")]; chosen = next((name for runtime_name, device_name in preferred for runtime, name in available if runtime == runtime_name and name == device_name), None); chosen = chosen or (available[0][1] if available else ""); print("platform=iOS Simulator,name=" + chosen); sys.exit(0 if chosen else 1)')"
          rm -rf /tmp/pirate-ios-sdk-tests
