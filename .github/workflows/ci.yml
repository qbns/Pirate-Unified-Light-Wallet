  # ========================================================================
  # Signed Release Artifacts (Non-Reproducible)
  # ========================================================================

  sign-android:
    name: Sign - Android (APK/AAB)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    env:
      GRADLE_OPTS: "-Dorg.gradle.vfs.watch=false"
    needs:
      - package-android
    steps:
      - name: Check signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_B64 }}" ] && [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        if: steps.signing.outputs.enabled == 'true'
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Install Android Build Tools
        if: steps.signing.outputs.enabled == 'true'
        run: |
          yes | sdkmanager "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}"

      - name: Download APK artifacts (V8)
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: android-apk-unsigned-v8
          path: dist/android

      - name: Download APK artifacts (V7)
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: android-apk-unsigned-v7
          path: dist/android

      - name: Download APK artifacts (x86)
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: android-apk-unsigned-x86
          path: dist/android

      - name: Download AAB artifacts
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: android-aab
          path: dist/android

      - name: Decode keystore
        if: steps.signing.outputs.enabled == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > "$RUNNER_TEMP/keystore.jks"

      - name: Sign APK and AAB
        if: steps.signing.outputs.enabled == 'true'
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEY_PASSWORD="${KEY_PASSWORD:-$KEYSTORE_PASSWORD}"
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/${{ env.ANDROID_BUILD_TOOLS_VERSION }}/apksigner"
          if [ ! -f "$APKSIGNER" ]; then
            echo "apksigner not found at $APKSIGNER" >&2
            exit 1
          fi
          mapfile -t APK_UNSIGNED_LIST < <(ls dist/android/*-unsigned.apk 2>/dev/null || true)
          if [ "${#APK_UNSIGNED_LIST[@]}" -eq 0 ]; then
            echo "No unsigned APKs found in dist/android" >&2
            exit 1
          fi
          for APK_UNSIGNED in "${APK_UNSIGNED_LIST[@]}"; do
            APK_SIGNED="${APK_UNSIGNED/-unsigned.apk/.apk}"
            echo "Signing $APK_UNSIGNED -> $APK_SIGNED"
            "$APKSIGNER" sign \
              --ks "$KEYSTORE_PATH" \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --key-pass "pass:$KEY_PASSWORD" \
              --out "$APK_SIGNED" \
              "$APK_UNSIGNED"
            "$APKSIGNER" verify --verbose "$APK_SIGNED"
            sha256sum "$APK_SIGNED" > "$APK_SIGNED.sha256"
          done

          AAB_UNSIGNED="dist/android/pirate-unified-wallet-android-unsigned.aab"
          AAB_SIGNED="dist/android/pirate-unified-wallet-android.aab"
          if [ ! -f "$AAB_UNSIGNED" ]; then
            echo "Unsigned AAB not found at $AAB_UNSIGNED" >&2
            exit 1
          fi
          cp "$AAB_UNSIGNED" "$AAB_SIGNED"
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$AAB_SIGNED" \
            "$KEY_ALIAS"
          sha256sum "$AAB_SIGNED" > "$AAB_SIGNED.sha256"

      - name: Upload signed APK (V8)
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-apk-signed-v8
          path: |
            dist/android/pirate-unified-wallet-android-V8.apk
            dist/android/pirate-unified-wallet-android-V8.apk.sha256
          if-no-files-found: error

      - name: Upload signed APK (V7)
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-apk-signed-v7
          path: |
            dist/android/pirate-unified-wallet-android-V7.apk
            dist/android/pirate-unified-wallet-android-V7.apk.sha256
          if-no-files-found: error

      - name: Upload signed APK (x86)
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-apk-signed-x86
          path: |
            dist/android/pirate-unified-wallet-android-x86.apk
            dist/android/pirate-unified-wallet-android-x86.apk.sha256
          if-no-files-found: error

      - name: Upload signed AAB
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-aab-signed
          path: |
            dist/android/pirate-unified-wallet-android.aab
            dist/android/pirate-unified-wallet-android.aab.sha256
          if-no-files-found: error

  sign-windows:
    name: Sign - Windows (Installer/Portable)
    runs-on: windows-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - package-windows
    steps:
      - name: Check signing secrets
        id: signing
        shell: pwsh
        run: |
          if ("${{ secrets.WINDOWS_SIGN_CERT_PFX_B64 }}" -and "${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}") {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding ascii -Append
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding ascii -Append
          }

      - name: Download Windows artifacts
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: windows-desktop
          path: dist/windows

      - name: Decode Windows signing certificate
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_SIGN_CERT_PFX_B64 }}"))
          "WINDOWS_SIGN_CERT=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append

      - name: Sign Windows artifacts
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signtoolPath = $null
          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue)
          if ($signtool) { $signtoolPath = $signtool.Source }
          if (-not $signtoolPath) {
            $signtool = (Get-Command signtool -ErrorAction SilentlyContinue)
            if ($signtool) { $signtoolPath = $signtool.Source }
          }
          if (-not $signtoolPath) {
            $kitRoots = @()
            $pf86 = [Environment]::GetEnvironmentVariable('ProgramFiles(x86)')
            if ($pf86) { $kitRoots += (Join-Path $pf86 'Windows Kits\\10\\bin') }
            $pf = [Environment]::GetEnvironmentVariable('ProgramFiles')
            if ($pf) { $kitRoots += (Join-Path $pf 'Windows Kits\\10\\bin') }
            $kitRoots += 'C:\\Program Files (x86)\\Windows Kits\\10\\bin'
            $kitRoots += 'C:\\Program Files\\Windows Kits\\10\\bin'
            $kitRoots = $kitRoots | Select-Object -Unique
            foreach ($kitRoot in $kitRoots) {
              if (-not (Test-Path $kitRoot)) { continue }
              $signtoolCandidate = Get-ChildItem -Path (Join-Path $kitRoot '10.*\\x64\\signtool.exe') -ErrorAction SilentlyContinue |
                Select-Object -First 1
              if (-not $signtoolCandidate) {
                $versionDirs = Get-ChildItem -Path $kitRoot -Directory -ErrorAction SilentlyContinue |
                  Sort-Object Name -Descending
                foreach ($dir in $versionDirs) {
                  $candidate = Join-Path $dir.FullName 'x64\\signtool.exe'
                  if (Test-Path $candidate) {
                    $signtoolPath = $candidate
                    break
                  }
                }
              } else {
                $signtoolPath = $signtoolCandidate.FullName
              }
              if ($signtoolPath) { break }
            }
          }
          if (-not $signtoolPath) {
            Write-Host "signtool not found. Attempting to install Windows SDK..."
            choco install windows-sdk-10.0.22621.0 -y --no-progress
            $kitRoot = 'C:\\Program Files (x86)\\Windows Kits\\10\\bin'
            if (Test-Path $kitRoot) {
              $signtoolCandidate = Get-ChildItem -Path (Join-Path $kitRoot '10.*\\x64\\signtool.exe') -ErrorAction SilentlyContinue |
                Select-Object -First 1
              if ($signtoolCandidate) { $signtoolPath = $signtoolCandidate.FullName }
            }
          }
          if (-not $signtoolPath) {
            Write-Error "signtool not found on PATH or in Windows Kits"
            exit 1
          }

          $cert = $env:WINDOWS_SIGN_CERT
          $pass = "${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}"

          $installerUnsigned = "dist/windows/pirate-unified-wallet-windows-installer-unsigned.exe"
          $installerSigned = "dist/windows/pirate-unified-wallet-windows-installer.exe"
          if (Test-Path $installerUnsigned) {
            Copy-Item $installerUnsigned $installerSigned -Force
            & $signtoolPath sign /fd SHA256 /f $cert /p $pass $installerSigned
            (Get-FileHash -Algorithm SHA256 $installerSigned).Hash | Set-Content -Encoding ascii "$installerSigned.sha256"
          } else {
            Write-Host "Unsigned installer not found; skipping installer signing."
          }

          $zipUnsigned = "dist/windows/pirate-unified-wallet-windows-portable-unsigned.zip"
          $zipSigned = "dist/windows/pirate-unified-wallet-windows-portable.zip"
          if (-not (Test-Path $zipUnsigned)) {
            Write-Error "Unsigned portable zip not found"
            exit 1
          }
          $tempDir = Join-Path $env:RUNNER_TEMP "portable"
          if (Test-Path $tempDir) { Remove-Item $tempDir -Recurse -Force }
          Expand-Archive -Path $zipUnsigned -DestinationPath $tempDir
          Get-ChildItem $tempDir -Recurse -Include *.exe,*.dll | ForEach-Object {
            & $signtoolPath sign /fd SHA256 /f $cert /p $pass $_.FullName
          }
          if (Test-Path $zipSigned) { Remove-Item $zipSigned -Force }
          Compress-Archive -Path (Join-Path $tempDir '*') -DestinationPath $zipSigned
          (Get-FileHash -Algorithm SHA256 $zipSigned).Hash | Set-Content -Encoding ascii "$zipSigned.sha256"

          $runtimeExe = Get-ChildItem $tempDir -Recurse -Filter *.exe | Sort-Object FullName | Select-Object -First 1
          if ($runtimeExe) {
            $runtimeHashPath = "dist/windows/$($runtimeExe.Name).sha256"
            (Get-FileHash -Algorithm SHA256 $runtimeExe.FullName).Hash | Set-Content -Encoding ascii $runtimeHashPath
          }

      - name: Upload signed Windows artifacts
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-signed
          path: |
            dist/windows/pirate-unified-wallet-windows-installer.exe
            dist/windows/pirate-unified-wallet-windows-portable.zip
            dist/windows/*.sha256
          if-no-files-found: warn

  sign-macos:
    name: Sign - macOS (DMG)
    runs-on: macos-14
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - package-macos
    steps:
      - name: Check signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.MACOS_SIGN_CERT_P12_B64 }}" ] && [ -n "${{ secrets.MACOS_SIGN_CERT_PASSWORD }}" ] && [ -n "${{ secrets.MACOS_APPLE_ID }}" ] && [ -n "${{ secrets.MACOS_TEAM_ID }}" ] && [ -n "${{ secrets.MACOS_APP_PASSWORD }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing macOS signing/notarization secrets. Skipping signed+notarized macOS DMG." >&2
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.signing.outputs.enabled == 'true'
        with:
          fetch-depth: 0

      - name: Setup Flutter
        if: steps.signing.outputs.enabled == 'true'
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}-sdk-v2
          pub-cache-key: flutter-pub-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}-v2

      - name: Setup Rust
        if: steps.signing.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup Go
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Import macOS signing certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          CERT_PASSWORD: ${{ secrets.MACOS_SIGN_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/macos-signing.p12"
          echo "${{ secrets.MACOS_SIGN_CERT_P12_B64 }}" | base64 -d > "$CERT_PATH"
          KEYCHAIN="$RUNNER_TEMP/macos-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "MACOS_SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "MACOS_SIGN_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Resolve macOS signing identity
        if: steps.signing.outputs.enabled == 'true'
        run: |
          KEYCHAIN="${MACOS_SIGN_KEYCHAIN:-$RUNNER_TEMP/macos-signing.keychain-db}"
          if [ -f "$KEYCHAIN" ] && [ -n "${MACOS_SIGN_KEYCHAIN_PASSWORD:-}" ]; then
            security unlock-keychain -p "$MACOS_SIGN_KEYCHAIN_PASSWORD" "$KEYCHAIN"
            security list-keychains -s "$KEYCHAIN"
            security default-keychain -s "$KEYCHAIN"
          fi

          if [ -n "${MACOS_SIGN_IDENTITY:-}" ]; then
            echo "MACOS_SIGN_IDENTITY=$MACOS_SIGN_IDENTITY" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -n "${{ secrets.MACOS_SIGN_IDENTITY }}" ]; then
            echo "MACOS_SIGN_IDENTITY=${{ secrets.MACOS_SIGN_IDENTITY }}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -f "$KEYCHAIN" ]; then
            IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F '\"' 'NR==1 {print $2}')"
          else
            IDENTITY="$(security find-identity -v -p codesigning | awk -F '\"' 'NR==1 {print $2}')"
          fi
          if [ -z "$IDENTITY" ]; then
            echo "No code signing identity found after import" >&2
            if [ -f "$KEYCHAIN" ]; then
              security find-identity -v -p codesigning "$KEYCHAIN" || true
            else
              security find-identity -v -p codesigning || true
            fi
            exit 1
          fi
          echo "MACOS_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build signed macOS DMG
        if: steps.signing.outputs.enabled == 'true'
        env:
          MACOS_NOTARIZE: "true"
          MACOS_APPLE_ID: ${{ secrets.MACOS_APPLE_ID }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          MACOS_APP_PASSWORD: ${{ secrets.MACOS_APP_PASSWORD }}
        run: |
          chmod +x scripts/build-macos.sh
          REPRODUCIBLE=0 ./scripts/build-macos.sh true

      - name: Upload signed DMG
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: macos-dmg-signed
          path: |
            dist/macos/pirate-unified-wallet-macos.dmg
            dist/macos/pirate-unified-wallet-macos.dmg.sha256
          if-no-files-found: error

  sign-ios:
    name: Sign - iOS (IPA)
    runs-on: macos-14
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - package-ios
    steps:
      - name: Check signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.IOS_SIGNING_CERT_P12_B64 }}" ] && [ -n "${{ secrets.IOS_SIGNING_CERT_PASSWORD }}" ] && [ -n "${{ secrets.IOS_PROVISIONING_PROFILE_B64 }}" ] && [ -n "${{ secrets.IOS_EXPORT_OPTIONS_PLIST_B64 }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.signing.outputs.enabled == 'true'
        with:
          fetch-depth: 0

      - name: Setup Flutter
        if: steps.signing.outputs.enabled == 'true'
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}-sdk-v2
          pub-cache-key: flutter-pub-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}-v2

      - name: Setup Rust
        if: steps.signing.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install CocoaPods
        if: steps.signing.outputs.enabled == 'true'
        run: gem install cocoapods -v ${{ env.COCOAPODS_VERSION }}

      - name: Import iOS signing certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          CERT_PASSWORD: ${{ secrets.IOS_SIGNING_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/ios-signing.p12"
          echo "${{ secrets.IOS_SIGNING_CERT_P12_B64 }}" | base64 -d > "$CERT_PATH"
          KEYCHAIN="$RUNNER_TEMP/ios-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Install provisioning profile
        if: steps.signing.outputs.enabled == 'true'
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_B64 }}" | base64 -d > "$PROFILE_PATH"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Install ExportOptions.plist
        if: steps.signing.outputs.enabled == 'true'
        run: |
          echo "${{ secrets.IOS_EXPORT_OPTIONS_PLIST_B64 }}" | base64 -d > app/ios/ExportOptions.plist

      - name: Build signed iOS IPA
        if: steps.signing.outputs.enabled == 'true'
        run: |
          chmod +x scripts/build-ios.sh
          REPRODUCIBLE=0 ./scripts/build-ios.sh true

      - name: Upload signed IPA
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ios-ipa-signed
          path: |
            dist/ios/pirate-unified-wallet-ios.ipa
            dist/ios/pirate-unified-wallet-ios.ipa.sha256
          if-no-files-found: error

  sign-linux:
    name: Sign - Linux (GPG)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - package-linux
    steps:
      - name: Check signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.LINUX_GPG_PRIVATE_KEY_B64 }}" ] && [ -n "${{ secrets.LINUX_GPG_PASSPHRASE }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download AppImage artifacts
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: linux-appimage
          path: dist/linux

      - name: Download Debian artifacts
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: linux-deb
          path: dist/linux

      - name: Download Flatpak artifacts
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: linux-flatpak
          path: dist/linux

      - name: Import GPG key
        if: steps.signing.outputs.enabled == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
        run: |
          echo "${{ secrets.LINUX_GPG_PRIVATE_KEY_B64 }}" | base64 -d | gpg --batch --import

      - name: Sign Linux artifacts
        if: steps.signing.outputs.enabled == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for file in dist/linux/*.AppImage dist/linux/*.deb dist/linux/*.flatpak; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --armor --detach-sign "$file"
          done

      - name: Upload Linux signatures
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linux-signatures
          path: dist/linux/*.asc
          if-no-files-found: warn

  virustotal-scan:
    name: Security - VirusTotal Scan (Artifacts)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - package-android
      - package-ios
      - package-windows
      - package-macos
      - package-linux
      - sign-android
      - sign-windows
      - sign-macos
      - sign-ios
      - sign-linux
    steps:
      - name: Check VirusTotal API key
        id: vt
        run: |
          if [ -n "${{ secrets.VIRUSTOTAL_API_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing VIRUSTOTAL_API_KEY secret. Skipping VirusTotal artifact scanning." >&2
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.vt.outputs.enabled == 'true'

      - name: Download artifacts
        if: steps.vt.outputs.enabled == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: vt-artifacts

      - name: Scan artifacts with VirusTotal
        if: steps.vt.outputs.enabled == 'true'
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          VT_MIN_INTERVAL_SECONDS: "16"
          VT_POLL_TIMEOUT_SECONDS: "1200"
        run: |
          python3 scripts/virustotal_scan.py vt-artifacts vt-report
          {
            echo "## VirusTotal"
            echo ""
            cat vt-report/virustotal-results.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload VirusTotal report
        if: steps.vt.outputs.enabled == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: virustotal-report
          path: vt-report/*
          if-no-files-found: warn

  release:
    name: Release - Publish Artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    needs:
      - ci-success
      - backend-release-plan
      - package-cli
      - package-native-ffi
      - package-ios-sdk
      - package-android-sdk
      - package-react-native-plugin
      - sign-android
      - sign-windows
      - sign-macos
      - sign-ios
      - sign-linux
      - virustotal-scan
    steps:
      - name: Checkout tag for release notes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: release-artifacts

      - name: Collect release files
        run: |
          set -euo pipefail
          mkdir -p release release-meta

          # Signed artifacts.
          find release-artifacts -type f \( \
            -name 'pirate-unified-wallet-android-*.apk' \
            -o -name 'pirate-unified-wallet-android.aab' \
            -o -name 'pirate-unified-wallet-windows-installer.exe' \
            -o -name 'pirate-unified-wallet-windows-portable.zip' \
            -o -name 'pirate-unified-wallet-macos.dmg' \
            -o -name 'pirate-unified-wallet-ios.ipa' \
          \) ! -name '*-unsigned*' -exec cp -f {} release/ \;

          # If Windows signing is unavailable, publish unsigned Windows artifacts
          # so testers still receive desktop builds.
          if [ ! -f release/pirate-unified-wallet-windows-installer.exe ]; then
            unsigned_installer="$(find release-artifacts -type f -name 'pirate-unified-wallet-windows-installer-unsigned.exe' | head -n 1 || true)"
            if [ -n "$unsigned_installer" ]; then
              cp -f "$unsigned_installer" release/
            fi
          fi
          if [ ! -f release/pirate-unified-wallet-windows-portable.zip ]; then
            unsigned_portable="$(find release-artifacts -type f -name 'pirate-unified-wallet-windows-portable-unsigned.zip' | head -n 1 || true)"
            if [ -n "$unsigned_portable" ]; then
              cp -f "$unsigned_portable" release/
            fi
          fi

          # Since we don't have Apple Developer credentials yet, CI will skip signing/notarization.
          # Still publish the unsigned DMG so testers can run it (they may need to clear quarantine).
          if [ ! -f release/pirate-unified-wallet-macos.dmg ]; then
            unsigned_dmg="$(find release-artifacts -type f -name 'pirate-unified-wallet-macos-unsigned.dmg' | head -n 1 || true)"
            if [ -n "$unsigned_dmg" ]; then
              cp -f "$unsigned_dmg" release/
            fi
          fi

          # Linux packages (distributed with detached signatures) + iOS simulator.
          find release-artifacts -type f \( \
            -name '*.AppImage' \
            -o -name '*.deb' \
            -o -name '*.flatpak' \
            -o -name 'pirate-unified-wallet-ios-simulator.app.zip' \
          \) -exec cp -f {} release/ \;

          if [ "${{ needs.backend-release-plan.outputs.cli_changed }}" = "true" ] || [ "${{ needs.backend-release-plan.outputs.qortal_cli_changed }}" = "true" ]; then
            find release-artifacts -type f \( \
              -name 'piratewallet-cli' \
              -o -name 'piratewallet-cli.exe' \
              -o -name 'pirate-qortal-cli' \
              -o -name 'pirate-qortal-cli.exe' \
            \) -exec cp -f {} release/ \;
          fi

          if [ "${{ needs.backend-release-plan.outputs.native_ffi_changed }}" = "true" ] || [ "${{ needs.backend-release-plan.outputs.ios_sdk_changed }}" = "true" ] || [ "${{ needs.backend-release-plan.outputs.android_sdk_changed }}" = "true" ]; then
            find release-artifacts -type f \( \
              -name 'libpirate_ffi_native.a' \
              -o -name 'libpirate_ffi_native.so' \
              -o -name 'pirate_ffi_native.dll' \
              -o -name 'pirate_ffi_native.lib' \
              -o -name 'pirate_wallet_service.h' \
            \) -exec cp -f {} release/ \;
          fi

          if [ "${{ needs.backend-release-plan.outputs.ios_sdk_changed }}" = "true" ]; then
            find release-artifacts -type f \( \
              -name 'PirateWalletNative.xcframework.zip' \
              -o -name 'PirateWalletNative.xcframework.zip.sha256' \
              -o -name 'PirateWalletSDK-package.zip' \
              -o -name 'PirateWalletSDK-package.zip.sha256' \
            \) -exec cp -f {} release/ \;
          fi

          if [ "${{ needs.backend-release-plan.outputs.android_sdk_changed }}" = "true" ]; then
            find release-artifacts -type f \( \
              -name '*.aar' \
              -o -name 'pirate-android-sdk-package.zip' \
              -o -name 'pirate-android-sdk-package.zip.sha256' \
            \) -exec cp -f {} release/ \;
          fi

          if [ "${{ needs.backend-release-plan.outputs.react_native_plugin_changed }}" = "true" ]; then
            find release-artifacts -type f \( \
              -name 'react-native-pirate-wallet-package.zip' \
              -o -name 'react-native-pirate-wallet-package.zip.sha256' \
            \) -exec cp -f {} release/ \;
          fi

          # Hashes and signatures: keep both direct assets (for in-app verification)
          # and a bundled metadata zip (for manual download convenience).
          find release-artifacts -type f \( \
            -name '*.sha256' \
            -o -name '*.asc' \
          \) -exec cp -f {} release-meta/ \;

          # Publish checksums/signatures directly as release assets too.
          find release-meta -type f \( \
            -name '*.sha256' \
            -o -name '*.asc' \
          \) -exec cp -f {} release/ \;

          # VirusTotal scan report (optional; only present when VIRUSTOTAL_API_KEY is configured).
          if [ -d release-artifacts/virustotal-report ]; then
            find release-artifacts/virustotal-report -type f -maxdepth 1 -exec cp -f {} release-meta/ \;
          fi

          # Flatpak hashes are not generated during packaging.
          for flatpak in release/*.flatpak; do
            hash_name="release-meta/$(basename "$flatpak").sha256"
            if [ -f "$flatpak" ] && [ ! -f "$hash_name" ]; then
              sha256sum "$flatpak" > "$hash_name"
            fi
          done

          for backend_asset in \
            release/piratewallet-cli \
            release/piratewallet-cli.exe \
            release/pirate-qortal-cli \
            release/pirate-qortal-cli.exe \
            release/libpirate_ffi_native.a \
            release/libpirate_ffi_native.so \
            release/pirate_ffi_native.dll \
            release/pirate_ffi_native.lib \
            release/pirate_wallet_service.h; do
            if [ -f "$backend_asset" ]; then
              sha256sum "$backend_asset" > "release-meta/$(basename "$backend_asset").sha256"
            fi
          done

          if ls release-meta/* >/dev/null 2>&1; then
            (cd release-meta && zip -q ../release/pirate-unified-wallet-release-metadata.zip ./*)
          else
            echo "No release metadata files found to package."
          fi

          echo "Release files:"
          ls -la release

      - name: Build release notes from annotated tag
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_REF="refs/tags/$TAG_NAME"
          TAG_TYPE="$(git cat-file -t "$TAG_REF" 2>/dev/null || true)"
          if [ "$TAG_TYPE" = "tag" ]; then
            TAG_BODY="$(git cat-file -p "$TAG_REF" | sed -n '1,/^$/d')"
          else
            echo "Tag '$TAG_NAME' is lightweight; using commit message fallback."
            COMMIT_SHA="$(git rev-parse "$TAG_REF" 2>/dev/null || true)"
            if [ -n "$COMMIT_SHA" ]; then
              COMMIT_SUBJECT="$(git log -1 --format=%s "$COMMIT_SHA")"
              COMMIT_BODY="$(git log -1 --format=%b "$COMMIT_SHA")"
              if [ -n "$COMMIT_BODY" ]; then
                TAG_BODY="$(printf "%s\n\n%s" "$COMMIT_SUBJECT" "$COMMIT_BODY")"
              else
                TAG_BODY="$COMMIT_SUBJECT"
              fi
            else
              TAG_BODY="$TAG_NAME"
            fi
          fi
          mkdir -p release-notes
          printf "%s\n" "$TAG_BODY" > release-notes/RELEASE_NOTES.md

      - name: Generate iOS SPM release manifest
        if: needs.backend-release-plan.outputs.ios_sdk_changed == 'true'
        run: |
          set -euo pipefail
          XC_ZIP="release/PirateWalletNative.xcframework.zip"
          XC_SHA="release/PirateWalletNative.xcframework.zip.sha256"
          if [ ! -f "$XC_ZIP" ] || [ ! -f "$XC_SHA" ]; then
            echo "iOS SDK release assets not found; skipping SPM manifest."
            exit 0
          fi
          CHECKSUM="$(awk '{print $1}' "$XC_SHA")"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/PirateWalletNative.xcframework.zip"
          chmod +x scripts/generate-ios-spm-release-manifest.sh
          scripts/generate-ios-spm-release-manifest.sh \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_REF_NAME}" \
            "$URL" \
            "$CHECKSUM" \
            > release/PirateWalletSDK-Package.swift

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file release-notes/RELEASE_NOTES.md
          else
            gh release create "$TAG" --notes-file release-notes/RELEASE_NOTES.md
          fi
          gh release upload "$TAG" release/* --clobber

  ci-success:
    name: CI - All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - workflow-action-pinning
      - frb-codegen
      - rust-lint
      - rust-test
      - rust-property-tests
      - rust-migration-tests
      - rust-perf-tests
      - security-audit
      - security-deny
      - security-semgrep-rust
      # security-semgrep-dart disabled due to CI memory constraints
      - flutter-analyze
      - flutter-test
      - build-matrix
      - backend-release-plan
      - package-cli
      - package-native-ffi
      - package-ios-sdk
      - package-android-sdk
      - package-android
      - package-ios
      - package-windows
      - package-macos
      - package-linux
    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed successfully! Artifacts ready for distribution."
